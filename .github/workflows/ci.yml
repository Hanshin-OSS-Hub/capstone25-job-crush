name: Full Service CI Build Check

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # 1. 백엔드 빌드 체크
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend # 백엔드 폴더 기준 빌드
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 프론트엔드 빌드 체크
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend # 프론트엔드 폴더 기준 빌드
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max